<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Demo - Contact Form</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Testing Demo</h1>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/form.html" class="active">Contact Form</a></li>
                <li><a href="/about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="form-section">
            <h2>Contact Form</h2>
            <p>Fill out the form below to test form validation and submission.</p>

            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        required 
                        placeholder="Enter your name"
                        aria-label="Name">
                    <span class="error-message" id="name-error"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        placeholder="Enter your email"
                        aria-label="Email">
                    <span class="error-message" id="email-error"></span>
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea 
                        id="message" 
                        name="message" 
                        required 
                        rows="5"
                        placeholder="Enter your message"
                        aria-label="Message"></textarea>
                    <span class="error-message" id="message-error"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submit-btn">Submit</button>
                    <button type="reset" class="btn btn-secondary" id="reset-btn">Reset</button>
                </div>
            </form>

            <div id="form-success" class="success-message" style="display: none;">
                <p>✓ Form submitted successfully!</p>
            </div>

            <div id="form-error" class="error-message-box" style="display: none;">
                <p>✗ Please correct the errors above.</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Testing Demo. Generic demonstration project.</p>
        </div>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
